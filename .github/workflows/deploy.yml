name: Triển khai ứng dụng lên Docker Hub

on:
push:
branches: [ "main" ]

jobs:
build_and_push_docker:
runs-on: ubuntu-latest

```
steps:
  - name: Bước 1 - Tải code
    uses: actions/checkout@v4

  - name: Bước 2 - Đăng nhập Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Bước 3 - Cài đặt Buildx
    uses: docker/setup-buildx-action@v3

  - name: Bước 4 - Build và Push Image
    uses: docker/build-push-action@v5
    with:
      context: .
      file: ./Dockerfile
      push: true
      tags: |
        ${{ secrets.DOCKER_USERNAME }}/bai-tap-spring-boot:latest
        ${{ secrets.DOCKER_USERNAME }}/bai-tap-spring-boot:${{ github.sha }}
```
