name: CI/CD Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Tự động chạy khi có code mới đẩy lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # --- ROBOT 1: Lấy code từ GitHub về ---
      - name: Checkout code
        uses: actions/checkout@v3

      # --- BƯỚC ĐỆM BẮT BUỘC: Build mã nguồn Spring Boot ---
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # --- ROBOT 2: Đăng nhập Docker Hub (Sử dụng 2 Secret bạn vừa tạo) ---
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- ROBOT 3: Đóng gói Docker và Đẩy lên Hub ---
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          # LƯU Ý: Bạn có thể đổi chữ "bai-tap-spring-boot" thành tên bất kỳ bạn muốn
          tags: ${{ secrets.DOCKER_USERNAME }}/bai-tap-spring-boot:latest