name: Triển khai ứng dụng lên Docker Hub    # Tên quy trình

on:
  push:
    branches: [ "main" ]    # Chạy khi có code mới đẩy lên nhánh main

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest  # Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      - name: Bước 1 - Tải code
        uses: actions/checkout@v4            # Robot tự động copy code vào máy ảo

      - name: Bước 2 - Đăng nhập Docker Hub
        uses: docker/login-action@v3         # Cung cấp tài khoản để đẩy image lên
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Cài đặt công cụ Buildx
        uses: docker/setup-buildx-action@v3  # Môi trường cần thiết để build Docker image

      - name: Bước 4 - Build và Push Image
        uses: docker/build-push-action@v5    # Đóng gói và đăng tải sản phẩm lên Docker Hub
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |                            # Đặt tên và phiên bản cho Image
            ${{ secrets.DOCKER_USERNAME }}/woonghotuannguyen/my-profile:latest
            ${{ secrets.DOCKER_USERNAME }}/woonghotuannguyen/my-profile:${{ github.sha }}
