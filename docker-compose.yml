services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: woonghotuannguyen-app:latest
    container_name: woonghotuannguyen-container
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-woongho_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-woongho_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-woongho_password}
    ports:
      - "8080:8080"
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: woonghotuannguyen-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-woongho_db}
      MYSQL_USER: ${MYSQL_USER:-woongho_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-woongho_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
